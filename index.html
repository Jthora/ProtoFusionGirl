<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- FusionGirl App Icons and Favicons -->
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/favicon-512.png" />
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Meta for app appearance -->
    <meta name="theme-color" content="#4169E1" />
    <meta name="application-name" content="ProtoFusionGirl" />
    <meta name="apple-mobile-web-app-title" content="ProtoFusionGirl" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <!-- SEO and Open Graph -->
    <meta name="description" content="Experience superior AI-mediated gameplay in ProtoFusionGirl. Control Jane through advanced ASI interface with omniscient awareness and environmental orchestration." />
    <meta property="og:title" content="ProtoFusionGirl - ASI Control Interface" />
    <meta property="og:description" content="Experience superior AI-mediated gameplay through advanced ASI control systems." />
    <meta property="og:image" content="/favicon-512.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ProtoFusionGirl" />
    <meta name="twitter:description" content="Advanced ASI Control Interface Game" />
    <meta name="twitter:image" content="/favicon-512.png" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProtoFusionGirl - ASI Control Interface</title>
  </head>
  <body>
    <!-- Preloader and Splash Screen -->
    <div id="preloader" class="preloader">
      <div class="preloader-content">
        <!-- FusionGirl Icon with Glow -->
        <div class="fusion-icon">
          <img src="/favicon-512.png" alt="FusionGirl" class="icon-image">
          <div class="energy-ring"></div>
          <div class="energy-ring energy-ring-2"></div>
        </div>
        
        <!-- Loading Progress -->
        <div class="loading-container">
          <div class="loading-text">ProtoFusionGirl</div>
          <div class="loading-subtitle">ASI Control Interface</div>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="loading-status" id="loading-status">Initializing...</div>
        </div>
        
        <!-- Ley Line Animation -->
        <div class="leyline-animation">
          <div class="leyline leyline-1"></div>
          <div class="leyline leyline-2"></div>
          <div class="leyline leyline-3"></div>
        </div>
      </div>
    </div>
    
    <!-- Main Game Container -->
    <div id="app"></div>
    
    <!-- Loading Script (runs before main app) -->
    <script type="module" src="/src/loading/preloader.ts"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
