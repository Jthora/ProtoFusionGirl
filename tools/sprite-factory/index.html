<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PFG Sprite Factory</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
    }
    #sidebar {
      width: 220px;
      min-width: 180px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar h1 {
      padding: 12px;
      font-size: 14px;
      color: #00e5ff;
      border-bottom: 1px solid #0f3460;
      letter-spacing: 1px;
    }
    .char-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px;
      border-bottom: 1px solid #0f3460;
    }
    .char-tabs button {
      background: #0f3460;
      color: #ccc;
      border: 1px solid #1a4a7a;
      border-radius: 3px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .char-tabs button.active, .char-tabs button:hover {
      background: #00e5ff;
      color: #000;
    }
    #anim-list {
      overflow-y: auto;
      flex: 1;
      padding: 4px 0;
    }
    .anim-row {
      padding: 7px 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 2px;
      border-left: 3px solid transparent;
    }
    .anim-row:hover { background: #0f3460; }
    .anim-row.active {
      background: #0f3460;
      border-left-color: #00e5ff;
    }
    .anim-key  { color: #e0e0e0; font-weight: bold; }
    .anim-meta { color: #888; font-size: 11px; }
    #canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      position: relative;
    }
    #info-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      color: #00e5ff;
      pointer-events: none;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>SPRITE FACTORY</h1>
    <div class="char-tabs" id="char-tabs"></div>
    <div id="anim-list"></div>
  </div>
  <div id="canvas-wrap">
    <div id="phaser-container"></div>
    <div id="info-overlay">Select an animation →</div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
